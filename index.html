<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dsidebar Obito</title>
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0a0f1c;
        color: #e0e6ff;
        display: flex;
    }

    .sidebar {
        width: 260px;
        height: 100vh;
        background: linear-gradient(180deg, #0f1a3a, #050814);
        box-shadow: 0 0 25px rgba(0, 150, 255, 0.5);
        padding: 20px;
    }

    .title {
        font-size: 22px;
        font-weight: bold;
        margin-bottom: 20px;
        color: #66ccff;
        text-shadow: 0 0 12px #3399ff, 0 0 25px #0033ff;
    }

    .section {
        margin-bottom: 25px;
    }

    .section h3 {
        font-size: 14px;
        margin-bottom: 10px;
        color: #99ccff;
        border-bottom: 1px solid rgba(255,255,255,0.1);
        padding-bottom: 5px;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .item {
        display: block;
        padding: 8px;
        margin: 5px 0;
        border-radius: 6px;
        text-decoration: none;
        color: #e0e6ff;
        transition: 0.25s;
    }

    .item:hover {
        background: rgba(0, 150, 255, 0.2);
        box-shadow: 0 0 12px rgba(0,150,255,0.6);
        transform: translateX(4px);
    }

    .main {
        flex: 1;
        padding: 20px;
    }
</style>
</head>
<body>

<div class="sidebar">
    <div class="title">Rift Hub</div>

    <div class="section">
        <h3>Partner Clubs</h3>
        <a class="item" href="https://www.chess.com/club/stray-kids-club" target="_blank">Stray Kids Club</a>
        <a class="item" href="https://www.chess.com/club/anime-team-3" target="_blank">Anime Team</a>
        <a class="item" href="https://www.chess.com/club/jujutsu-high-1" target="_blank">Jujutsu High</a>
        <a class="item" href="https://www.chess.com/club/anime-chess-team-1" target="_blank">Anime Chess Team.</a>
    </div>

    <!--<div class="section">
        <h3>Important Forums</h3>
        <a class="item" href="" target="_blank">General Discussion</a>
        <a class="item" href="" target="_blank">Help & Support</a>
        <a class="item" href="" target="_blank">Tournaments</a>
    </div>

    <div class="section">
        <h3>Quick Links</h3>
        <a class="item" href="" target="_blank">Play</a>
        <a class="item" href="" target="_blank">Puzzles</a>
        <a class="item" href="" target="_blank">Lessons</a>
    </div>
</div>-->

<div class="main">
    <h1>Welcome to the Void Rift</h1>
    <p>Select a section from the sidebar.</p>
</div>

</body>
</html>
